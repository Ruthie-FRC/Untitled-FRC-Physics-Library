# Deploy Vendordep and MkDocs docs to jsim.dev

name: Release JSim to JSim.dev

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version number"
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-site:
    name: "Build MkDocs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install docs toolchain
        run: |
          pip install mkdocs mkdocs-material ghp-import
      - name: Build docs site and stage API references
        run: |
          mkdocs build --config-file mkdocs/mkdocs.yml
      - name: Upload mkdocs site
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs
          path: mkdocs/site/

  build-docs:
    name: "API Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Build Javadoc and Doxygen
        working-directory: vendordep
        run: ./gradlew javadoc doxygenDox
      - name: Upload Javadocs artifact
        uses: actions/upload-artifact@v4
        with:
          name: javadocs
          path: vendordep/build/docs/javadoc
      - name: Upload Doxygen artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen
          path: vendordep/build/docs/doxygen

  build-docker:
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: wpilib/roborio-cross-ubuntu:2025-22.04
            artifact-name: Athena
            build-options: "-Ponlylinuxathena"
          - container: wpilib/raspbian-cross-ubuntu:bookworm-22.04
            artifact-name: Arm32
            build-options: "-Ponlylinuxarm32"
          - container: wpilib/aarch64-cross-ubuntu:bookworm-22.04
            artifact-name: Arm64
            build-options: "-Ponlylinuxarm64"
          - container: wpilib/ubuntu-base:22.04
            artifact-name: Linux
            build-options: ""
    name: "Build - ${{ matrix.artifact-name }}"
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Fetch all history and metadata
        run: |
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch origin "${default_branch}:${default_branch}" --update-head-ok || git fetch origin "${default_branch}"
          git remote set-head origin "${default_branch}" || true
      - run: pip3 install wpiformat
      - name: Build with Gradle
        working-directory: vendordep
        run: ./gradlew build ${{ matrix.build-options }}
      - name: Test with Gradle
        working-directory: vendordep
        run: ./gradlew test ${{ matrix.build-options }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: vendordep/build/allOutputs

  build-host:
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
      MACOSX_DEPLOYMENT_TARGET: 13.3
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact-name: Win64
            architecture: x64
          # - os: macos-14
          #   artifact-name: macOS
          #   architecture: aarch64
    name: "Build - ${{ matrix.artifact-name }}"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Fetch all history and metadata
        shell: bash
        run: |
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch --prune --unshallow
          git fetch origin "${default_branch}:${default_branch}" --update-head-ok || git fetch origin "${default_branch}"
          git remote set-head origin "${default_branch}" || true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          architecture: ${{ matrix.architecture }}
      - name: Build with Gradle
        working-directory: vendordep
        run: ./gradlew build -Pbuildalldesktop
      - name: Test with Gradle
        working-directory: vendordep
        run: ./gradlew test -Pbuildalldesktop
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: vendordep/build/allOutputs

  combine:
    name: Combine
    needs: [ build-docker, build-host ]
    runs-on: ubuntu-22.04
    env:
      releaseVersion: ${{ inputs.releaseVersion }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: wpilibsuite/build-tools
      - uses: actions/download-artifact@v4
        with:
          path: combiner/products/build/allOutputs
      - name: Flatten Artifacts
        run: rsync -a --delete combiner/products/build/allOutputs/*/* combiner/products/build/allOutputs/
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Combine
        run: ./gradlew publish -Pthirdparty
        working-directory: combiner
      - uses: actions/upload-artifact@v4
        with:
          name: Maven
          path: ~/releases

  deploy:
    name: Deploy
    needs: [ combine, build-docs, build-site ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install docs toolchain
        run: |
          pip install mkdocs mkdocs-material ghp-import
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: deploy/artifacts/
      - name: Prepare JSim.dev
        run: |
          mkdir -p deploy/artifacts/jsim.dev/maven/
          mkdir -p deploy/artifacts/jsim.dev/api/javadocs/
          mkdir -p deploy/artifacts/jsim.dev/doxygen/
          rsync -a --delete deploy/artifacts/javadocs/*/* deploy/artifacts/jsim.dev/api/javadocs/
          rsync -a --delete deploy/artifacts/doxygen/*/* deploy/artifacts/jsim.dev/api/doxygen/
          rsync -a --delete deploy/artifacts/Maven/*/* deploy/artifacts/jsim.dev/maven/
          rsync -a --delete deploy/artifacts/mkdocs/*/* deploy/artifacts/jsim.dev/
          find deploy/artifacts/jsim.dev -type f
      - name: Upload JSim artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSim
          path: deploy/artifacts/jsim.dev/
      - name: Configure git identity for deployment
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
      - name: Deploy to GitHub Pages
        run: |
          ghp-import -n -p -f deploy/artifacts