name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify legacy native test sources exist
        run: |
          set -euo pipefail
          count=$(find vendordep/tests -maxdepth 1 -type f -name '*.cpp' | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "No standalone native tests found in vendordep/tests" >&2
            exit 1
          fi
          echo "Found $count standalone native test source files."

      - name: Run test suite
        run: |
          cd vendordep
          ./gradlew test
